name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: netspectre-linux-x64
          - os: macos-latest
            artifact: netspectre-macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: make -f Makefile.docker all

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          SDK=$(xcrun --show-sdk-path)
          make CXX=g++ CXXFLAGS="-std=c++17 -O2 -Wall -Wno-deprecated-declarations -Iinclude -isysroot $SDK" all

      - name: Package binaries
        run: |
          cd build
          tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz

  docker-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/netspectre-dpi:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/netspectre-dpi:latest
